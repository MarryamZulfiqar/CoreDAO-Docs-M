name: AI Docs Quality Check

on:
  pull_request:
    paths:
      - "docs/**/*.md"
      - "docs/**/*.mdx"
  push:
    branches:
      - main
    paths:
      - "docs/**/*.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── 1. Frontmatter Validation ───────────────────────────────────────────────
  frontmatter-check:
    name: Validate 12-field Frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install js-yaml
        run: npm install -g js-yaml

      - name: Check required frontmatter fields
        run: |
          REQUIRED_FIELDS="id title sidebar_label sidebar_position description keywords tags hide_table_of_contents last_update custom_edit_url pagination_next pagination_prev"
          FAILED=0
          while IFS= read -r -d '' file; do
            # Extract YAML block
            fm=$(awk '/^---/{if(++c==1){found=1;next} if(c==2){exit}} found{print}' "$file")
            if [ -z "$fm" ]; then
              echo "::warning file=$file::No frontmatter found"
              continue
            fi
            for field in $REQUIRED_FIELDS; do
              if ! echo "$fm" | grep -q "^${field}:"; then
                echo "::error file=$file::Missing frontmatter field: ${field}"
                FAILED=1
              fi
            done
          done < <(find docs -name "*.md" -not -path "*/node_modules/*" -print0)
          exit $FAILED

  # ── 2. Broken Links Check ───────────────────────────────────────────────────
  link-check:
    name: Check Internal Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Check for broken links in build
        run: |
          if [ -d "build" ]; then
            echo "Build succeeded — checking for 404 pages..."
            find build -name "*.html" | xargs grep -l "404\|Page Not Found" | head -20 || true
          fi

  # ── 3. AI Readability / LLMs.txt Check ─────────────────────────────────────
  llms-txt-check:
    name: Validate llms.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check llms.txt exists
        run: |
          if [ ! -f "static/llms.txt" ]; then
            echo "::error::static/llms.txt is missing. AI model discovery file is required."
            exit 1
          fi
          echo "✅ llms.txt found"
          wc -l static/llms.txt

      - name: Validate llms.txt structure
        run: |
          # Check for required sections
          SECTIONS="## Key Concepts ## Developer ## Node ## FAQ ## Reference"
          FAILED=0
          for section in "Key Concepts" "Developer" "Node" "Reference"; do
            if ! grep -q "## .*${section}" static/llms.txt; then
              echo "::warning::llms.txt missing section containing: ${section}"
            fi
          done

  # ── 4. Markdown Lint ────────────────────────────────────────────────────────
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "docs/**/*.md"
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD028": false,
              "MD024": false,
              "MD036": false
            }
        continue-on-error: true

  # ── 5. Spell Check ──────────────────────────────────────────────────────────
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: "docs/**/*.md"
          config: |
            {
              "version": "0.2",
              "language": "en",
              "words": [
                "coredao", "CoreDAO", "stCORE", "coreBTC", "CLTV",
                "DPoW", "DPoS", "satoshi", "Satoshi", "validator",
                "validators", "tokenomics", "frontmatter", "precompile",
                "hardhat", "foundry", "subgraph", "testnet", "mainnet",
                "LayerZero", "thirdweb", "metamask", "MetaMask",
                "redelegation", "redelegate", "unstake", "timelock",
                "ERC20", "ERC721", "EVM", "RPC", "JSON", "YAML",
                "llmstxt", "llms", "docusaurus", "Docusaurus",
                "CCIP", "Chainlink", "coreCCIP"
              ],
              "ignorePaths": [
                "node_modules/**",
                "build/**",
                ".docusaurus/**"
              ]
            }
        continue-on-error: true

  # ── 6. Summary Report ───────────────────────────────────────────────────────

  llms-full-check:
    name: Validate llms-full.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check llms-full.txt exists and is non-empty
        run: |
          if [ ! -f "static/llms-full.txt" ]; then
            echo "❌ static/llms-full.txt is missing"
            exit 1
          fi
          SIZE=$(wc -c < static/llms-full.txt)
          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ llms-full.txt is suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "✅ llms-full.txt present and valid ($SIZE bytes)"

  robots-check:
    name: Validate robots.txt and ai.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check AI permission files exist
        run: |
          [ -f "static/robots.txt" ] && echo "✅ robots.txt" || (echo "❌ robots.txt missing" && exit 1)
          [ -f "static/ai.txt" ]     && echo "✅ ai.txt"     || (echo "❌ ai.txt missing"     && exit 1)
          grep -q "GPTBot" static/robots.txt     && echo "✅ GPTBot allowed" || echo "⚠️  GPTBot not declared"
          grep -q "anthropic-ai" static/robots.txt && echo "✅ anthropic-ai allowed" || echo "⚠️  anthropic-ai not declared"

  summary:
    name: Post Check Summary
    runs-on: ubuntu-latest
    needs: [frontmatter-check, link-check, llms-txt-check, markdown-lint, spell-check]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Frontmatter Check': '${{ needs.frontmatter-check.result }}',
              'Link Check': '${{ needs.link-check.result }}',
              'LLMs.txt Check': '${{ needs.llms-txt-check.result }}',
              'Markdown Lint': '${{ needs.markdown-lint.result }}',
              'Spell Check': '${{ needs.spell-check.result }}',
            };
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const rows = Object.entries(jobs)
              .map(([name, result]) => `| ${icon(result)} ${name} | ${result} |`)
              .join('\n');
            const body = `## 🤖 AI Docs Quality Check Results\n\n| Check | Status |\n|-------|--------|\n${rows}\n\n*Powered by CoreDAO AI Docs CI*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
